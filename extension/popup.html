<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen Web Summarizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 500px;
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 2px solid #9b0000;
      padding-bottom: 12px;
    }

    .header h2 {
      font-size: 16px;
      color: #ffffff;
      font-weight: bold;
    }

    .badge {
      background: #9b0000;
      color: white;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    button {
      width: 100%;
      background: #9b0000;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 14px;
      transition: background 0.2s;
    }

    button:hover { background: #b71c1c; }
    button:disabled { background: #555; cursor: not-allowed; }

    .status {
      font-size: 11px;
      color: #aaaaaa;
      margin-bottom: 8px;
      min-height: 16px;
    }

    pre {
      background: #111111;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.7;
      height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #e0e0e0;
    }

    .footer {
      margin-top: 10px;
      font-size: 9px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🧠</span>
    <h2>Qwen Web Summarizer</h2>
    <span class="badge">OFFLINE</span>
  </div>

  <button id="summarizeBtn">⚡ Summarize This Page</button>
  <div class="status" id="status">Ready. Click above to summarize.</div>
  <pre id="output">Summary will appear here...</pre>
  <div class="footer">Powered by Qwen3:1.7B · Runs locally via Ollama</div>

  <script src="popup.js"></script>
</body>
</html>
